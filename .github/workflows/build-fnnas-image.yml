# ==============================================================
# 自定义 FnNAS 构建脚本（自动匹配 DTB）
# 使用规则：将 .dtb 文件命名为 “设备型号.dtb” 放入 make/dtb/
# 例如：dg-tn3568.dtb, s905lb-r3300l.dtb
# ==============================================================

name: Custom Build FnNAS (Auto DTB)

on:
  workflow_dispatch:
    inputs:
      fnnas_base_version:
        description: "FnNAS 基础镜像版本"
        required: true
        type: choice
        default: "rockchip_1253"
        options:
          - amlogic_1252
          - amlogic_693
          - rockchip_1253
          - rockchip_692
          - allwinner_1254
          - allwinner_691
      fnnas_board:
        description: "目标设备型号（同时用于匹配 make/dtb/ 下的 .dtb 文件）"
        required: true
        type: string
        default: "dg-tn3568"
      fnnas_kernel:
        description: "内核分支"
        required: true
        type: choice
        default: "6.18.y"
        options:
          - 6.18.y
          - 6.12.y
      builder_name:
        description: "固件签名"
        required: true
        type: choice
        default: "ophub"
        options:
          - ophub
          - angel
          - yourname
      rootfs_expand:
        description: "根分区扩容 (GiB)"
        required: false
        default: "16"

env:
  TZ: Etc/UTC
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils jq curl

      - name: 下载 FnNAS 基础镜像
        id: download
        run: |
          BASE_VERSION="${{ inputs.fnnas_base_version }}"
          echo "基础镜像版本: ${BASE_VERSION}"

          RELEASE_JSON=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/ophub/fnnas/releases?per_page=20)

          IMAGE_URL=$(echo "${RELEASE_JSON}" | jq -r \
            --arg ver "${BASE_VERSION}" \
            '[.[] | select(.tag_name | contains("fnnas_base_image"))]
             | map(.assets[] | select(.name | contains($ver) and endswith(".img.xz")))
             | sort_by(.updated_at) | reverse | .[0] | .url')

          if [[ -z "${IMAGE_URL}" || "${IMAGE_URL}" == "null" ]]; then
            echo "❌ 未找到 ${BASE_VERSION} 基础镜像"
            exit 1
          fi

          IMAGE_NAME=$(echo "${RELEASE_JSON}" | jq -r \
            --arg ver "${BASE_VERSION}" \
            '[.[] | select(.tag_name | contains("fnnas_base_image"))]
             | map(.assets[] | select(.name | contains($ver) and endswith(".img.xz")))
             | sort_by(.updated_at) | reverse | .[0] | .name')

          echo "下载镜像: ${IMAGE_NAME}"
          curl -fSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${IMAGE_URL}" \
            -o "${IMAGE_NAME}"

          if [[ ! -f "${IMAGE_NAME}" ]]; then
            echo "❌ 下载失败"
            exit 1
          fi

          echo "✅ 基础镜像已下载: ${IMAGE_NAME}"
          echo "image_file=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: 自动匹配并复制 DTB
        id: dtb
        run: |
          case "${{ inputs.fnnas_base_version }}" in
            amlogic*)   PLATFORM="amlogic" ;;
            rockchip*)  PLATFORM="rockchip" ;;
            allwinner*) PLATFORM="allwinner" ;;
            *)          PLATFORM="rockchip" ;;
          esac

          BOARD="${{ inputs.fnnas_board }}"
          # 自动寻找与设备型号同名的 .dtb 文件
          DTB_FILE="${{ github.workspace }}/make/dtb/${BOARD}.dtb"
          DIFF_DIR="${{ github.workspace }}/make-fnnas/fnnas-files/different-files/${BOARD}/boot/dtb/${PLATFORM}"
          mkdir -p "${DIFF_DIR}"

          if [[ ! -f "${DTB_FILE}" ]]; then
            echo "❌ 找不到与设备 ${BOARD} 匹配的 DTB 文件：${DTB_FILE}"
            echo "请将 .dtb 文件命名为 ${BOARD}.dtb 并放入 make/dtb/ 目录"
            exit 1
          fi

          cp "${DTB_FILE}" "${DIFF_DIR}/"
          echo "✅ 已自动匹配 DTB：${BOARD}.dtb → ${DIFF_DIR}"
          ls -la "${DIFF_DIR}"

      - name: 打包 FnNAS
        uses: ophub/fnnas@main
        with:
          fnnas_path: "${{ env.image_file }}"
          fnnas_board: ${{ inputs.fnnas_board }}
          fnnas_kernel: ${{ inputs.fnnas_kernel }}
          auto_kernel: true
          kernel_repo: ophub/fnnas
          rootfs_expand: ${{ inputs.rootfs_expand }}
          builder_name: ${{ inputs.builder_name }}

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        if: env.PACKAGED_STATUS == 'success' && !cancelled()
        with:
          tag: "fnnas_${{ inputs.fnnas_base_version }}"
          artifacts: "${{ env.PACKAGED_OUTPUTPATH }}/*"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 自定义 FnNAS 镜像（自动匹配 DTB）
            - 基础镜像: ${{ inputs.fnnas_base_version }}
            - 设备型号: ${{ inputs.fnnas_board }}
            - 内核分支: ${{ inputs.fnnas_kernel }}
            - 设备树文件: ${BOARD}.dtb