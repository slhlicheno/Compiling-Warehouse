name: Build Armbian (正统完整构建 + 预编译 U-Boot)

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "系统版本"
        required: true
        type: choice
        default: 'trixie'
        options:
          - bookworm
          - trixie
          - noble
      kernel_branch:
        description: "内核分支 (unifreq 仓库)"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出你的仓库（含板级配置、DTB、预编译 U-Boot）
        uses: actions/checkout@v4

      - name: 拉取 Armbian 官方构建镜像
        run: docker pull ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest

      - name: 准备构建环境（注入自定义 U-Boot 部署逻辑）
        run: |
          # 1. 克隆官方构建框架
          git clone --depth=1 --branch=main https://github.com/armbian/build armbian-sdk

          # 2. 创建板级配置文件（不指定 U-Boot 编译，内核和 RootFS 正常生成）
          cat > armbian-sdk/config/boards/s905x-p212.wip << 'EOF'
          BOARD_NAME="S905X-P212 TV Box"
          BOARDFAMILY="meson-gxl"
          LINUXFAMILY="meson64"
          KERNEL_TARGET="current,edge"
          FULL_DESKTOP="no"
          BOOTCONFIG=""
          SKIP_BOOT_SOURCE="yes"
          SERIALCON="ttyAML0"
          BOOT_FDT_FILE="amlogic/meson-gxl-s905x-p212.dtb"
          EOF

          # 3. 将你的自定义 DTB 放入 SDK 的 overlay 路径
          mkdir -p armbian-sdk/userpatches/overlay/boot/dtb/amlogic
          if [ -f "userpatches/overlay/boot/dtb/amlogic/meson-gxl-s905x-p212.dtb" ]; then
            cp userpatches/overlay/boot/dtb/amlogic/meson-gxl-s905x-p212.dtb armbian-sdk/userpatches/overlay/boot/dtb/amlogic/
            echo "✅ 自定义 DTB 已复制"
          else
            echo "⚠️ 未找到自定义 DTB，将使用 SDK 生成的默认 DTB"
          fi

          # 4. 将预编译 U-Boot 放入容器内固定路径
          mkdir -p armbian-sdk/.tmp/uboot_prebuilt
          if [ -d "uboot" ] && [ "$(ls -A uboot 2>/dev/null)" ]; then
            cp -a uboot/* armbian-sdk/.tmp/uboot_prebuilt/
            echo "✅ 预编译 U-Boot 已就位"
          else
            echo "❌ 未找到 uboot/ 目录，请放入预编译的 U-Boot 文件（如 u-boot-r3300l.bin）"
            exit 1
          fi

          # 5. 【核心】在宿主机上直接替换 U-Boot 编译函数，加入变量检查
          sed -i '/^compile_uboot()/,/^}/c\
compile_uboot() {\
  echo ">> (宿主修改) 跳过 U-Boot 编译，直接部署预编译文件"\
  if [ -z "${uboottempdir}" ] || [ -z "${uboot_name}" ]; then\
    echo "❌ uboottempdir 或 uboot_name 为空，无法部署 U-Boot"\
    return 1\
  fi\
  mkdir -p "${uboottempdir}/usr/lib/${uboot_name}"\
  cp -a "/armbian/.tmp/uboot_prebuilt"/* "${uboottempdir}/usr/lib/${uboot_name}/"\
  echo ">> U-Boot 部署完成 (从预编译文件)"\
  return 0\
}' armbian-sdk/lib/functions/compilation/uboot.sh

          echo "✅ U-Boot 编译函数已被替换"

      - name: 配置宿主机的 QEMU 支持
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo modprobe binfmt_misc 2>/dev/null || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:F' | sudo tee /proc/sys/fs/binfmt_misc/register
            echo "✅ ARM64 binfmt 已注册"
          else
            echo "✅ ARM64 binfmt 已存在"
          fi

      - name: 完整构建（内核 + RootFS + 打包）
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/armbian-sdk":/armbian \
            -v "$PWD/output":/armbian/output \
            -e ALLOW_ROOT=yes \
            ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest \
            /bin/bash -c "
              cd /armbian
              echo '>> 开始完整构建...'
              ./compile.sh \
                BOARD=s905x-p212 \
                BRANCH=current \
                RELEASE=${{ inputs.armbian_release }} \
                KERNELSOURCE=https://github.com/unifreq/linux-${{ inputs.kernel_branch }} \
                KERNELBRANCH=${{ inputs.kernel_branch }} \
                BUILD_MINIMAL=yes \
                BUILD_DESKTOP=no \
                KERNEL_CONFIGURE=no \
                FORCE_BOOTSCRIPT_UPDATE=nope \
                USE_CCACHE=yes \
                docker=no
            "

      - name: 收集镜像并上传
        run: |
          mkdir -p output-final
          cp output/images/*.img.xz output-final/ 2>/dev/null || true
          cp output/images/*.img.gz output-final/ 2>/dev/null || true
          echo "✅ 镜像已收集"

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian-${{ inputs.armbian_release }}-${{ inputs.kernel_branch }}"
          artifacts: "output-final/*.img.*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 Armbian (官方完整构建，自定义 U-Boot)
            - 内核: unifreq/linux-${{ inputs.kernel_branch }}
            - 系统: ${{ inputs.armbian_release }}
            - 引导: 预编译 U-Boot (来自仓库 uboot/ 目录)
