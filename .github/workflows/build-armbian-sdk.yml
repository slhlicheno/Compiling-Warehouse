name: Build Armbian (SDK via Manual Docker)

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "系统版本"
        required: true
        type: choice
        default: 'trixie'
        options:
          - bookworm
          - trixie
          - noble
      kernel_branch:
        description: "内核分支 (unifreq 仓库)"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出你的仓库
        uses: actions/checkout@v4

      - name: 拉取 Armbian 官方构建镜像
        run: |
          docker pull ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest

      - name: 准备完整的构建环境
        run: |
          git clone --depth=1 --branch=main https://github.com/armbian/build armbian-sdk
          mkdir -p armbian-sdk/config/boards
          mkdir -p armbian-sdk/userpatches/overlay
          cp config/boards/s905x-p212.wip armbian-sdk/config/boards/
          if [ -d "userpatches/overlay" ]; then
            cp -r userpatches/overlay/* armbian-sdk/userpatches/overlay/
          fi
          echo "✅ 构建环境已准备完毕"
          echo "板级配置："
          cat armbian-sdk/config/boards/s905x-p212.wip
          echo "自定义文件列表："
          find armbian-sdk/userpatches -type f || true

      - name: 配置宿主机的 QEMU 支持（手动绑定，绕过 update-binfmts）
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          # 确保 binfmt_misc 模块已加载
          sudo modprobe binfmt_misc
          # 挂载 binfmt_misc 文件系统（如果尚未挂载）
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          # 直接向内核注册 ARM64 模拟器
          echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:F' | sudo tee /proc/sys/fs/binfmt_misc/register
          # 验证注册成功
          ls -la /proc/sys/fs/binfmt_misc
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 2>/dev/null || echo "ARM64 binfmt 已注册"

      - name: 在 Docker 容器内编译
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/armbian-sdk":/armbian \
            -v "$PWD/output":/armbian/output \
            -e ALLOW_ROOT=yes \
            ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest \
            /bin/bash -c "
              cd /armbian
              echo '>> 当前工作目录：'
              pwd
              echo '>> compile.sh 是否存在：'
              ls -l compile.sh
              echo '>> 开始编译...'
              ./compile.sh \
                BOARD=s905x-p212 \
                BRANCH=current \
                RELEASE=${{ inputs.armbian_release }} \
                KERNELSOURCE=https://github.com/unifreq/linux-${{ inputs.kernel_branch }} \
                KERNELBRANCH=${{ inputs.kernel_branch }} \
                BUILD_MINIMAL=yes \
                BUILD_DESKTOP=no \
                KERNEL_CONFIGURE=no \
                FORCE_BOOTSCRIPT_UPDATE=nope \
                USE_CCACHE=yes \
                docker=no
            "

      - name: 收集镜像
        run: |
          mkdir -p output-final
          cp output/images/*.img.xz output-final/ 2>/dev/null || true
          cp output/images/*.img.gz output-final/ 2>/dev/null || true

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian-SDK-${{ inputs.armbian_release }}-${{ inputs.kernel_branch }}"
          artifacts: "output-final/*.img.*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 Armbian 官方 SDK 构建 (手动 Docker)
            - 内核: unifreq/linux-${{ inputs.kernel_branch }}
            - 系统: ${{ inputs.armbian_release }}
