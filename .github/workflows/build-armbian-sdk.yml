name: Build Armbian (Official SDK Multi-Device)

on:
  workflow_dispatch:
    inputs:
      armbian_board:
        description: "目标设备型号"
        required: true
        type: choice
        default: "s905x-p212"
        options:
          - s905x-p212
      armbian_release:
        description: "系统版本"
        required: true
        type: choice
        default: "trixie"
        options:
          - bookworm
          - trixie
          - noble
      kernel_branch:
        description: "内核分支 (unifreq 仓库)"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出你的仓库
        uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl xz-utils \
            qemu-user-static debootstrap binfmt-support \
            build-essential flex bison libssl-dev bc

      - name: 克隆 Armbian 官方构建框架
        run: git clone --depth=1 --branch=main https://github.com/armbian/build armbian-build

      - name: 把自定义板级配置和 DTB 复制到 SDK
        run: |
          BOARD="${{ inputs.armbian_board }}"
          if [ ! -f "config/boards/${BOARD}.wip" ]; then
            echo "❌ 在仓库中找不到 config/boards/${BOARD}.wip" && exit 1
          fi
          mkdir -p armbian-build/config/boards
          cp "config/boards/${BOARD}.wip" "armbian-build/config/boards/"
          echo "✅ 已复制板级配置文件"
          if [ -d "userpatches/overlay" ]; then
            cp -r userpatches/overlay/* armbian-build/userpatches/overlay/
            echo "✅ 已复制 userpatches/overlay"
          fi
          # 验证
          echo "板级配置内容："
          cat "armbian-build/config/boards/${BOARD}.wip"

      - name: 编译最小化镜像
        run: |
          cd armbian-build
          sudo ./compile.sh \
            BOARD=${{ inputs.armbian_board }}.wip \
            BRANCH=current \
            RELEASE=${{ inputs.armbian_release }} \
            KERNELSOURCE=https://github.com/unifreq/linux-${{ inputs.kernel_branch }} \
            KERNELBRANCH=${{ inputs.kernel_branch }} \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            FORCE_BOOTSCRIPT_UPDATE=nope \
            USE_CCACHE=yes \
            docker=no

      - name: 收集镜像
        run: |
          mkdir -p output-final
          cp armbian-build/output/images/*.img.xz output-final/ 2>/dev/null || true
          cp armbian-build/output/images/*.img.gz output-final/ 2>/dev/null || true

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian-SDK-${{ inputs.armbian_board }}-${{ inputs.armbian_release }}-${{ inputs.kernel_branch }}"
          artifacts: "output-final/*.img.*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 Armbian 官方 SDK 构建
            - 设备: ${{ inputs.armbian_board }}
            - 内核: unifreq/linux-${{ inputs.kernel_branch }}
            - 系统: ${{ inputs.armbian_release }}
