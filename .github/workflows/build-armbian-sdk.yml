name: Build Armbian (SDK + 自定义 U-Boot/DTB)_Final

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "系统版本"
        required: true
        type: choice
        default: 'trixie'
        options:
          - bookworm
          - trixie
          - noble
      kernel_branch:
        description: "内核分支 (unifreq 仓库)"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出你的仓库
        uses: actions/checkout@v4

      - name: 拉取 Armbian 官方构建镜像
        run: docker pull ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest

      - name: 准备完整的构建环境（整合自定义 U-Boot 和 DTB）
        run: |
          git clone --depth=1 --branch=main https://github.com/armbian/build armbian-sdk

          mkdir -p armbian-sdk/config/boards
          cp config/boards/s905x-p212.wip armbian-sdk/config/boards/

          mkdir -p armbian-sdk/userpatches/overlay
          if [ -d "userpatches/overlay" ]; then
            cp -r userpatches/overlay/* armbian-sdk/userpatches/overlay/
            echo "✅ 自定义 DTB 已复制"
          fi

          if [ -d "uboot" ] && [ "$(ls -A uboot 2>/dev/null)" ]; then
            echo "✅ 发现自定义 U-Boot 文件，将在构建中使用它们"
            mkdir -p armbian-sdk/userpatches/overlay/usr/lib/u-boot
            cp -a uboot/* armbian-sdk/userpatches/overlay/usr/lib/u-boot/
            echo "SKIP_BOOT_SOURCE=yes" >> armbian-sdk/config/boards/s905x-p212.wip
          fi

          echo "板级配置文件最终内容："
          cat armbian-sdk/config/boards/s905x-p212.wip

      - name: 配置宿主机的 QEMU 支持（智能注册，避免重复）
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo modprobe binfmt_misc 2>/dev/null || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          if [ -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "✅ ARM64 binfmt 已注册，跳过注册。"
            cat /proc/sys/fs/binfmt_misc/qemu-aarch64
          else
            echo "注册 ARM64 binfmt..."
            echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:F' | sudo tee /proc/sys/fs/binfmt_misc/register || echo "注册失败，但继续编译"
          fi
          echo "已注册的 binfmt 条目："
          ls /proc/sys/fs/binfmt_misc/ 2>/dev/null || echo "无法列出条目，但可能仍然可用"

      - name: 在 Docker 容器内编译
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/armbian-sdk":/armbian \
            -v "$PWD/output":/armbian/output \
            -e ALLOW_ROOT=yes \
            ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest \
            /bin/bash -c "
              cd /armbian
              echo '>> 开始编译...'
              ./compile.sh \
                BOARD=s905x-p212 \
                BRANCH=current \
                RELEASE=${{ inputs.armbian_release }} \
                KERNELSOURCE=https://github.com/unifreq/linux-${{ inputs.kernel_branch }} \
                KERNELBRANCH=${{ inputs.kernel_branch }} \
                BUILD_MINIMAL=yes \
                BUILD_DESKTOP=no \
                KERNEL_CONFIGURE=no \
                FORCE_BOOTSCRIPT_UPDATE=nope \
                USE_CCACHE=yes \
                docker=no
            "

      - name: 收集镜像并上传到 Release
        run: |
          mkdir -p output-final
          cp output/images/*.img.xz output-final/ 2>/dev/null || true
          cp output/images/*.img.gz output-final/ 2>/dev/null || true

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian-SDK-${{ inputs.armbian_release }}-${{ inputs.kernel_branch }}"
          artifacts: "output-final/*.img.*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 Armbian 官方 SDK 构建 (智能QEMU + 自定义 U-Boot/DTB)
            - 内核: unifreq/linux-${{ inputs.kernel_branch }}
            - 系统: ${{ inputs.armbian_release }}
