name: Build Armbian (标准编译 + ophub 本地化打包)

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "系统版本"
        required: true
        type: choice
        default: 'trixie'
        options:
          - bookworm
          - trixie
          - noble
      kernel_branch:
        description: "内核分支 (ophub 预编译内核)"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y
      target_soc:
        description: "目标设备 SOC (用于 ophub 本地化)"
        required: true
        type: choice
        default: 's905x'
        options:
          - s905x
          - s905x3
          - s912
          - s922x

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出你的仓库 (获取自定义 DTB)
        uses: actions/checkout@v4

      # ═══════════════ 阶段1：编译标准 Armbian 镜像 ═══════════════
      - name: 拉取 Armbian 官方构建镜像
        run: docker pull ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest

      - name: 配置宿主机的 QEMU 支持
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static
          sudo modprobe binfmt_misc 2>/dev/null || true
          sudo mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          if [ ! -f /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:F' | sudo tee /proc/sys/fs/binfmt_misc/register
            echo "✅ ARM64 binfmt 已注册"
          else
            echo "✅ ARM64 binfmt 已存在"
          fi

      - name: 编译标准 Armbian 镜像 (基于 odroidn2)
        run: |
          git clone --depth=1 --branch=main https://github.com/armbian/build armbian-sdk
          mkdir -p standard-output
          docker run --rm --privileged \
            -v "$PWD/armbian-sdk":/armbian \
            -v "$PWD/standard-output":/armbian/output \
            -e ALLOW_ROOT=yes \
            ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-noble-latest \
            /bin/bash -c "
              cd /armbian
              ./compile.sh \
                BOARD=odroidn2 \
                BRANCH=current \
                RELEASE=${{ inputs.armbian_release }} \
                BUILD_MINIMAL=yes \
                BUILD_DESKTOP=no \
                KERNEL_CONFIGURE=no \
                docker=no
            "
          # 找到生成的标准镜像
          STANDARD_IMG=$(ls standard-output/output/images/*.img 2>/dev/null | head -1)
          if [ -z "$STANDARD_IMG" ]; then
            echo "❌ 未找到标准镜像"
            exit 1
          fi
          echo "standard_image=$STANDARD_IMG" >> $GITHUB_ENV

      # ═══════════════ 阶段2：ophub 本地化打包 ═══════════════
      - name: 准备 ophub 本地化所需的自定义 DTB
        run: |
          mkdir -p /opt/different-files/s905lb-r3300l/boot/dtb/amlogic
          if [ -f "userpatches/overlay/boot/dtb/amlogic/meson-gxl-s905x-p212.dtb" ]; then
            cp userpatches/overlay/boot/dtb/amlogic/meson-gxl-s905x-p212.dtb /opt/different-files/s905lb-r3300l/boot/dtb/amlogic/
            echo "✅ 自定义 DTB 已准备"
          else
            echo "⚠️ 未找到自定义 DTB，使用 ophub 默认"
          fi

      - name: 使用 ophub 进行本地化打包
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          armbian_path: ${{ env.standard_image }}
          armbian_soc: ${{ inputs.target_soc }}
          armbian_kernel: ${{ inputs.kernel_branch }}
          auto_kernel: true
          kernel_repo: ophub/kernel
          builder_name: "custom"
          different_files_path: "/opt/different-files"

      - name: 收集最终镜像并上传
        run: |
          mkdir -p output-final
          cp ${{ github.workspace }}/output/*.img.xz output-final/ 2>/dev/null || true
          cp ${{ github.workspace }}/output/*.img.gz output-final/ 2>/dev/null || true
          echo "✅ 最终镜像已收集"

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian-${{ inputs.armbian_release }}-${{ inputs.target_soc }}-${{ inputs.kernel_branch }}"
          artifacts: "output-final/*.img.*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 Armbian (标准编译 + ophub 本地化)
            - 内核: ophub/kernel ${{ inputs.kernel_branch }}
            - 系统: ${{ inputs.armbian_release }}
            - 设备: ${{ inputs.target_soc }} (含 R3300L 专属 DTB)
