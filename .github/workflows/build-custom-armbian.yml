# ==============================================================
# 自定义 Armbian 构建脚本（完整镜像，完全参照 ophub 官方逻辑）
# 
# 特点：
#   - 只下载非 trunk 的完整基础镜像（自带正确分区表）
#   - 挂载 p1（boot）和 p2（root）两个分区
#   - 替换内核引导文件到 p1，替换内核模块到 p2，替换头文件到 p2
#   - 注入自定义 DTB 并调整启动配置（保留原 APPEND 行）
#   - 确保 /boot/zImage 和 /boot/uInitrd 软链接存在
#   - 压缩并上传到 Release
# ==============================================================

name: Custom Build Armbian

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "Armbian 系统版本"
        required: true
        type: choice
        default: "bookworm"
        options:
          - trixie
          - bookworm
          - noble
      armbian_board:
        description: "目标设备型号（用于匹配 make/dtb/ 下的 .dtb 文件）"
        required: true
        type: string
        default: "s905lb-r3300l"
      armbian_kernel:
        description: "内核版本"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      builder_name:
        description: "固件签名"
        required: true
        type: choice
        default: "ophub"
        options:
          - ophub
          - angel
          - yourname

env:
  TZ: Etc/UTC
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils jq curl

      # ==================== 下载完整基础镜像（排除 trunk） ====================
      - name: 下载 Armbian 完整基础镜像
        id: download
        run: |
          RELEASE="${{ inputs.armbian_release }}"
          echo "系统版本: ${RELEASE}"

          RELEASE_JSON=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=20)

          # 取不含 -trunk- 的完整镜像
          IMAGE_ASSET=$(echo "${RELEASE_JSON}" | jq -r \
            --arg REL "Armbian_${RELEASE}_arm64_" \
            '[.[] | select(.tag_name | contains($REL))] |
             map(.assets[] | select(.name | contains("-trunk-") | not) | select(.name | endswith(".img.gz"))) |
             sort_by(.updated_at) | reverse | .[0]')

          if [[ -z "${IMAGE_ASSET}" || "${IMAGE_ASSET}" == "null" ]]; then
            echo "❌ 未找到 ${RELEASE} 的完整基础镜像"
            exit 1
          fi

          IMAGE_URL=$(echo "${IMAGE_ASSET}" | jq -r '.url')
          IMAGE_NAME=$(echo "${IMAGE_ASSET}" | jq -r '.name')

          echo "下载完整镜像: ${IMAGE_NAME}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${IMAGE_URL}" -o "${IMAGE_NAME}"

          if [[ ! -f "${IMAGE_NAME}" ]]; then
            echo "❌ 下载失败"
            exit 1
          fi
          echo "image_file=${IMAGE_NAME}" >> $GITHUB_ENV

      # ==================== 解压并挂载两个分区 ====================
      - name: 解压并挂载镜像
        id: mount
        run: |
          IMAGE_FILE="${{ env.image_file }}"
          gzip -d "${IMAGE_FILE}"
          BASE_IMAGE="${IMAGE_FILE%.gz}"
          echo "解压后镜像: ${BASE_IMAGE}"

          LOOP_DEV=$(sudo losetup -fP --show "${BASE_IMAGE}")
          echo "loop设备: ${LOOP_DEV}"
          sudo partprobe "${LOOP_DEV}" || true
          sleep 2

          # 挂载 p1（boot）和 p2（root）
          sudo mount "${LOOP_DEV}p1" /mnt
          sudo mkdir -p /mnt2
          sudo mount "${LOOP_DEV}p2" /mnt2

          echo "✅ p1 已挂载到 /mnt, p2 已挂载到 /mnt2"
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_ENV
          echo "loop_dev=${LOOP_DEV}" >> $GITHUB_ENV

      # ==================== 下载并替换内核 ====================
      - name: 下载并替换内核
        id: kernel
        run: |
          KERNEL_VERSION="${{ inputs.armbian_kernel }}"
          echo "目标内核: ${KERNEL_VERSION}"

          KERNEL_RELEASE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ophub/kernel/releases/tags/kernel_stable)

          KVER_MATCH="${KERNEL_VERSION%.y}."
          KERNEL_ASSET=$(echo "${KERNEL_RELEASE}" | jq -r \
            --arg KVER "${KVER_MATCH}" \
            '[.assets[] | select(.name | contains($KVER) and endswith(".tar.gz") and (contains("deb-") | not))] | sort_by(.updated_at) | reverse | .[0]')

          if [[ -z "${KERNEL_ASSET}" || "${KERNEL_ASSET}" == "null" ]]; then
            echo "❌ 未找到 ${KERNEL_VERSION} 的内核包"
            exit 1
          fi

          KERNEL_URL=$(echo "${KERNEL_ASSET}" | jq -r '.browser_download_url')
          KERNEL_NAME=$(echo "${KERNEL_ASSET}" | jq -r '.name')
          echo "下载内核: ${KERNEL_NAME}"
          curl -fsSL -o "${KERNEL_NAME}" "${KERNEL_URL}"

          mkdir -p kernel_tmp
          tar -xzf "${KERNEL_NAME}" -C kernel_tmp

          # 复制 boot 文件到 p1（/mnt）
          if [[ -d kernel_tmp/boot ]]; then
            sudo cp -a kernel_tmp/boot/* /mnt/
            echo "✅ 内核引导文件已复制到 p1"
          fi

          # 确保 /boot/zImage 和 /boot/uInitrd 软链接
          if [[ ! -L /mnt/zImage ]]; then
            VMLINUZ=$(ls /mnt/vmlinuz-* 2>/dev/null | head -1)
            [[ -n "$VMLINUZ" ]] && sudo ln -sf $(basename "$VMLINUZ") /mnt/zImage
          fi
          if [[ ! -L /mnt/uInitrd ]]; then
            INITRD=$(ls /mnt/uInitrd-* /mnt/initrd.img-* 2>/dev/null | head -1)
            [[ -n "$INITRD" ]] && sudo ln -sf $(basename "$INITRD") /mnt/uInitrd
          fi

          # 复制内核模块到 p2（/mnt2/lib/modules）
          if [[ -d kernel_tmp/lib/modules ]]; then
            sudo rsync -a kernel_tmp/lib/modules/ /mnt2/lib/modules/
            echo "✅ 内核模块已复制到 p2"
          fi

          # 复制头文件到 p2（/mnt2/usr），确保与内核版本一致
          if [[ -d kernel_tmp/usr ]]; then
            sudo cp -a kernel_tmp/usr/* /mnt2/usr/
            echo "✅ 内核头文件已复制到 p2"
          fi

          echo "✅ 内核替换完成"

      # ==================== 注入自定义 DTB + 启动配置 ====================
      - name: 注入 DTB 并配置启动
        id: inject
        run: |
          BOARD="${{ inputs.armbian_board }}"
          case "${BOARD}" in
            s9*|a311d*|s922*) PLATFORM="amlogic" ;;
            rk*|firefly*|orangepi*|nanopi*) PLATFORM="rockchip" ;;
            *) PLATFORM="amlogic" ;;
          esac

          DTB_FILE="${{ github.workspace }}/make/dtb/${BOARD}.dtb"
          if [[ ! -f "${DTB_FILE}" ]]; then
            echo "❌ 找不到 DTB: ${DTB_FILE}"
            exit 1
          fi

          # 复制 DTB 到 p1 的 dtb 目录
          TARGET_DTB="/mnt/dtb/${PLATFORM}/${BOARD}.dtb"
          sudo mkdir -p $(dirname "${TARGET_DTB}")
          sudo cp "${DTB_FILE}" "${TARGET_DTB}"

          # 启动配置
          EXTLINUX_CONF="/mnt/extlinux/extlinux.conf"
          EXTLINUX_BAK="/mnt/extlinux/extlinux.conf.bak"
          UENV_TXT="/mnt/uEnv.txt"
          ARMB_ENV="/mnt/armbianEnv.txt"
          NEW_FDT="/dtb/${PLATFORM}/${BOARD}.dtb"

          if [[ -f "${EXTLINUX_CONF}" ]]; then
            echo "处理 extlinux.conf ..."
            sudo cp "${EXTLINUX_CONF}" "${EXTLINUX_BAK}"
            sudo sed -i "s|^[[:space:]]*FDT.*|  FDT ${NEW_FDT}|g" "${EXTLINUX_CONF}"
          elif [[ -f "${UENV_TXT}" ]]; then
            echo "处理 uEnv.txt ..."
            sudo sed -i '/^FDT=/d' "${UENV_TXT}"
            echo "FDT=${NEW_FDT}" | sudo tee -a "${UENV_TXT}" > /dev/null
          elif [[ -f "${ARMB_ENV}" ]]; then
            echo "处理 armbianEnv.txt ..."
            sudo sed -i "s|^fdtfile=.*|fdtfile=${PLATFORM}/${BOARD}.dtb|" "${ARMB_ENV}"
          else
            echo "⚠️ 未找到任何启动配置文件，跳过"
          fi

          echo "✅ DTB 注入并启动配置完成"

      # ==================== 卸载并重新压缩 ====================
      - name: 卸载并压缩镜像
        run: |
          sudo umount /mnt2
          sudo umount /mnt
          sudo losetup -d "${{ env.loop_dev }}"
          BASE_IMAGE="${{ env.base_image }}"
          xz -T0 "${BASE_IMAGE}"
          echo "packaged_image=${BASE_IMAGE}.xz" >> $GITHUB_ENV
          echo "✅ 镜像已压缩"

      # ==================== 上传到 Release ====================
      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian_${{ inputs.armbian_release }}_${{ inputs.armbian_board }}_${{ inputs.armbian_kernel }}_custom"
          artifacts: "${{ env.packaged_image }}"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 自定义 Armbian（完整分区，可引导）
            - 系统: ${{ inputs.armbian_release }}
            - 设备: ${{ inputs.armbian_board }}
            - 内核: ${{ inputs.armbian_kernel }}
            - DTB: ${{ inputs.armbian_board }}.dtb