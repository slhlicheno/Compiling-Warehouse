# ==============================================================
# 自定义 Armbian 构建脚本（DTB + 完整内核 + 智能启动配置）
# 参考 ophub/amlogic-s9xxx-armbian 官方 rebuild 的 refactor_bootfs()
# ==============================================================

name: Custom Build Armbian (Smart Boot)

on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "Armbian 系统版本"
        required: true
        type: choice
        default: "bookworm"
        options:
          - trixie
          - bookworm
          - noble
      armbian_board:
        description: "目标设备型号（同时用于匹配 make/dtb/ 下的 .dtb 文件）"
        required: true
        type: string
        default: "s905lb-r3300l"
      armbian_kernel:
        description: "内核版本"
        required: true
        type: choice
        default: "5.15.y"
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      builder_name:
        description: "固件签名"
        required: true
        type: choice
        default: "ophub"
        options:
          - ophub
          - angel
          - yourname

env:
  TZ: Etc/UTC
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils jq curl

      - name: 下载 Armbian 基础镜像
        id: download_image
        run: |
          RELEASE="${{ inputs.armbian_release }}"
          echo "系统版本: ${RELEASE}"

          RELEASE_JSON=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=20)

          IMAGE_ASSET=$(echo "${RELEASE_JSON}" | jq -r \
            --arg REL "Armbian_${RELEASE}_arm64_" \
            --arg TRUNK "-trunk_" \
            '[.[] | select(.tag_name | contains($REL))] |
             map(.assets[] | select(.name | contains($TRUNK) and endswith(".img.gz"))) |
             sort_by(.updated_at) | reverse | .[0]')

          if [[ -z "${IMAGE_ASSET}" || "${IMAGE_ASSET}" == "null" ]]; then
            echo "❌ 未找到 ${RELEASE} 的基础镜像"
            exit 1
          fi

          IMAGE_URL=$(echo "${IMAGE_ASSET}" | jq -r '.url')
          IMAGE_NAME=$(echo "${IMAGE_ASSET}" | jq -r '.name')

          echo "下载镜像: ${IMAGE_NAME}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${IMAGE_URL}" \
            -o "${IMAGE_NAME}"

          if [[ ! -f "${IMAGE_NAME}" ]]; then
            echo "❌ 下载失败"
            exit 1
          fi

          echo "✅ 基础镜像已下载: ${IMAGE_NAME}"
          echo "image_file=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: 解压并挂载基础镜像
        id: mount
        run: |
          IMAGE_FILE="${{ env.image_file }}"
          gzip -d "${IMAGE_FILE}"
          BASE_IMAGE="${IMAGE_FILE%.gz}"
          echo "解压后镜像: ${BASE_IMAGE}"

          LOOP_DEV=$(sudo losetup -fP --show "${BASE_IMAGE}")
          echo "loop设备: ${LOOP_DEV}"
          sudo partprobe "${LOOP_DEV}" || true
          sleep 2

          if sudo mount "${LOOP_DEV}p2" /mnt 2>/dev/null; then
            echo "已挂载 ${LOOP_DEV}p2 → /mnt"
          else
            echo "p2 不存在，尝试挂载 p1"
            sudo mount "${LOOP_DEV}p1" /mnt
            echo "已挂载 ${LOOP_DEV}p1 → /mnt"
          fi

          echo "base_image=${BASE_IMAGE}" >> $GITHUB_ENV
          echo "loop_dev=${LOOP_DEV}" >> $GITHUB_ENV

      - name: 下载并完整替换内核
        id: kernel
        run: |
          KERNEL_VERSION="${{ inputs.armbian_kernel }}"
          echo "目标内核: ${KERNEL_VERSION}"

          KERNEL_RELEASE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ophub/kernel/releases/tags/kernel_stable)

          KVER_MATCH="${KERNEL_VERSION%.y}."
          KERNEL_ASSET=$(echo "${KERNEL_RELEASE}" | jq -r \
            --arg KVER "${KVER_MATCH}" \
            '[.assets[] | select(.name | contains($KVER) and endswith(".tar.gz") and (contains("deb-") | not))] | sort_by(.updated_at) | reverse | .[0]')

          if [[ -z "${KERNEL_ASSET}" || "${KERNEL_ASSET}" == "null" ]]; then
            echo "❌ 未找到 ${KERNEL_VERSION} 的内核包"
            exit 1
          fi

          KERNEL_URL=$(echo "${KERNEL_ASSET}" | jq -r '.browser_download_url')
          KERNEL_NAME=$(echo "${KERNEL_ASSET}" | jq -r '.name')

          echo "下载内核: ${KERNEL_NAME}"
          curl -fsSL -o "${KERNEL_NAME}" "${KERNEL_URL}"

          mkdir -p kernel_tmp
          tar -xzf "${KERNEL_NAME}" -C kernel_tmp

          if [[ -d kernel_tmp/boot ]]; then
            sudo find kernel_tmp/boot -name "vmlinuz-*" -exec sh -c 'cp -f "$1" "/mnt/boot/$(basename "$1")"' _ {} \;
            sudo find kernel_tmp/boot -name "System.map-*" -exec sh -c 'cp -f "$1" "/mnt/boot/$(basename "$1")"' _ {} \;
            sudo find kernel_tmp/boot -name "config-*" -exec sh -c 'cp -f "$1" "/mnt/boot/$(basename "$1")"' _ {} \;
            if [[ -f /mnt/boot/vmlinuz ]]; then sudo rm /mnt/boot/vmlinuz; fi
            sudo ln -s /mnt/boot/$(ls kernel_tmp/boot/vmlinuz-*) /mnt/boot/vmlinuz 2>/dev/null || echo "⚠️ 未创建vmlinuz链接"
            echo "✅ 内核镜像已更新"
          fi

          if [[ -d kernel_tmp/lib/modules ]]; then
            sudo rm -rf /mnt/lib/modules/*
            sudo cp -r kernel_tmp/lib/modules/* /mnt/lib/modules/
            echo "✅ 内核模块已更新"
          fi

          if [[ -d kernel_tmp/usr ]]; then
            sudo cp -r kernel_tmp/usr/* /mnt/usr/
            echo "✅ 内核头文件已更新"
          fi

          echo "✅ 内核已完整替换为 ${KERNEL_NAME}"

      - name: 注入自定义 DTB 并智能配置启动
        id: inject_dtb
        run: |
          BOARD="${{ inputs.armbian_board }}"
          # 判断平台
          if [[ "${BOARD}" == s9* || "${BOARD}" == a311d* || "${BOARD}" == s922* ]]; then
            PLATFORM="amlogic"
          elif [[ "${BOARD}" == rk* || "${BOARD}" == firefly* || "${BOARD}" == orangepi* || "${BOARD}" == nanopi* ]]; then
            PLATFORM="rockchip"
          else
            PLATFORM="amlogic"
          fi

          DTB_FILE="${{ github.workspace }}/make/dtb/${BOARD}.dtb"
          if [[ ! -f "${DTB_FILE}" ]]; then
            echo "❌ 找不到 DTB 文件: ${DTB_FILE}"
            echo "请将 .dtb 命名为 ${BOARD}.dtb 并放入 make/dtb/ 目录"
            exit 1
          fi

          TARGET_DIR="/mnt/boot/dtb/${PLATFORM}"
          sudo mkdir -p "${TARGET_DIR}"
          sudo cp "${DTB_FILE}" "${TARGET_DIR}/"

          # ---------- 智能检测并修改启动配置（参考 ophub rebuild 的 refactor_bootfs）----------
          CONFIG_FOUND=""
          # 1. 检查 armbianEnv.txt (Rockchip/Allwinner)
          if [[ -f /mnt/boot/armbianEnv.txt ]]; then
            CONFIG_FOUND="armbianEnv.txt"
            sudo sed -i "s|^fdtfile=.*|fdtfile=${PLATFORM}/${BOARD}.dtb|" /mnt/boot/armbianEnv.txt
            echo "✅ 已更新 armbianEnv.txt (fdtfile)"
          # 2. 检查 extlinux.conf (多用)
          elif [[ -f /mnt/boot/extlinux/extlinux.conf ]]; then
            CONFIG_FOUND="extlinux.conf"
            sudo sed -i "s|FDT /dtb/${PLATFORM}/.*|FDT /dtb/${PLATFORM}/${BOARD}.dtb|" /mnt/boot/extlinux/extlinux.conf
            echo "✅ 已更新 extlinux.conf"
          # 3. 检查 uEnv.txt (传统 Amlogic)
          elif [[ -f /mnt/boot/uEnv.txt ]]; then
            CONFIG_FOUND="uEnv.txt"
            echo "FDT=/dtb/${PLATFORM}/${BOARD}.dtb" | sudo tee /mnt/boot/uEnv.txt
            echo "✅ 已更新 uEnv.txt"
          # 4. 如果都没有，创建一个 uEnv.txt (强制为 Amlogic 兜底)
          else
            CONFIG_FOUND="（新建 uEnv.txt）"
            echo "FDT=/dtb/${PLATFORM}/${BOARD}.dtb" | sudo tee /mnt/boot/uEnv.txt > /dev/null
            echo "⚠️ 未找到任何启动配置文件，已新建 uEnv.txt"
          fi

          echo "✅ DTB 已注入: ${BOARD}.dtb (配置文件: ${CONFIG_FOUND})"

      - name: 卸载并重新压缩镜像
        id: repack
        run: |
          LOOP_DEV="${{ env.loop_dev }}"
          sudo umount /mnt
          sudo losetup -d "${LOOP_DEV}"
          BASE_IMAGE="${{ env.base_image }}"
          xz -T0 "${BASE_IMAGE}"
          PACKAGED_IMAGE="${BASE_IMAGE}.xz"
          echo "packaged_image=${PACKAGED_IMAGE}" >> $GITHUB_ENV
          echo "✅ 镜像已重新压缩: ${PACKAGED_IMAGE}"

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        with:
          tag: "Armbian_${{ inputs.armbian_release }}_${{ inputs.armbian_board }}_${{ inputs.armbian_kernel }}_custom"
          artifacts: "${{ env.packaged_image }}"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 自定义 Armbian 镜像（智能启动配置）
            - 系统版本: ${{ inputs.armbian_release }}
            - 设备型号: ${{ inputs.armbian_board }}
            - 内核版本: ${{ inputs.armbian_kernel }}
            - DTB 文件: ${{ inputs.armbian_board }}.dtb