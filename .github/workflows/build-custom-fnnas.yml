# ==============================================================
# 自定义 FnNAS 构建脚本（基于 ophub/fnnas 官方工作流）
# 参考：
#   - https://github.com/ophub/fnnas/blob/main/.github/workflows/build-fnnas-image.yml
#   - https://github.com/ophub/fnnas/blob/main/action.yml
# 功能：
#   1. 自动下载官方 FnNAS 基础镜像
#   2. 从 make/dts/ 或 make/dtb/ 读取自定义设备树
#   3. 可选编译 .dts → .dtb
#   4. 调用官方 action 打包，上传到 Release
# ==============================================================

name: Custom Build FnNAS

on:
  workflow_dispatch:
    inputs:
      fnnas_base_version:
        description: "FnNAS 基础镜像版本"
        required: true
        type: choice
        default: "rockchip_1253"
        options:
          - amlogic_1252
          - amlogic_693
          - rockchip_1253
          - rockchip_692
          - allwinner_1254
          - allwinner_691
      fnnas_board:
        description: "目标设备型号（需与 different-files 目录对应）"
        required: true
        type: string
        default: "dg-tn3568"
      fnnas_kernel:
        description: "内核分支"
        required: true
        type: choice
        default: "6.18.y"
        options:
          - 6.18.y
          - 6.12.y
      dtb_source:
        description: "设备树文件名（存放于 make/dts/ 或 make/dtb/）"
        required: true
        type: string
        default: "rk3568-dg-tn3568-final.dtb"
      compile_dts:
        description: "是否从 .dts 编译（true=编译，false=直接用 .dtb）"
        required: true
        type: boolean
        default: false
      builder_name:
        description: "固件签名"
        required: true
        type: choice
        default: "ophub"
        options:
          - ophub
          - angel
          - yourname
      rootfs_expand:
        description: "根分区扩容 (GiB)"
        required: false
        default: "16"

env:
  TZ: Etc/UTC
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils jq curl

      - name: 下载 FnNAS 基础镜像
        id: download
        run: |
          BASE_VERSION="${{ inputs.fnnas_base_version }}"
          echo "基础镜像版本: ${BASE_VERSION}"

          # 从 ophub/fnnas 官方 Release 获取最新镜像下载地址
          RELEASE_JSON=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/ophub/fnnas/releases?per_page=20)

          # 筛选出对应版本的最新镜像（按更新时间倒序）
          IMAGE_URL=$(echo "${RELEASE_JSON}" | jq -r \
            --arg ver "${BASE_VERSION}" \
            '[.[] | select(.tag_name | contains("fnnas_base_image"))]
             | map(.assets[] | select(.name | contains($ver) and endswith(".img.xz")))
             | sort_by(.updated_at) | reverse | .[0] | .url')

          if [[ -z "${IMAGE_URL}" || "${IMAGE_URL}" == "null" ]]; then
            echo "❌ 错误：未找到 ${BASE_VERSION} 基础镜像"
            exit 1
          fi

          IMAGE_NAME=$(echo "${RELEASE_JSON}" | jq -r \
            --arg ver "${BASE_VERSION}" \
            '[.[] | select(.tag_name | contains("fnnas_base_image"))]
             | map(.assets[] | select(.name | contains($ver) and endswith(".img.xz")))
             | sort_by(.updated_at) | reverse | .[0] | .name')

          echo "下载镜像: ${IMAGE_NAME}"
          curl -fSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${IMAGE_URL}" \
            -o "${IMAGE_NAME}"

          # 验证文件是否存在
          if [[ ! -f "${IMAGE_NAME}" ]]; then
            echo "❌ 下载失败"
            exit 1
          fi

          echo "✅ 基础镜像已下载: ${IMAGE_NAME}"
          # 设置输出供后续步骤使用
          echo "image_file=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: 处理自定义设备树
        id: dt
        run: |
          case "${{ inputs.fnnas_base_version }}" in
            amlogic*)   PLATFORM="amlogic" ;;
            rockchip*)  PLATFORM="rockchip" ;;
            allwinner*) PLATFORM="allwinner" ;;
            *)          PLATFORM="rockchip" ;;
          esac

          BOARD="${{ inputs.fnnas_board }}"
          DTS_DIR="${{ github.workspace }}/make/dts"
          DTB_DIR="${{ github.workspace }}/make/dtb"
          DIFF_DIR="${{ github.workspace }}/make-fnnas/fnnas-files/different-files/${BOARD}/boot/dtb/${PLATFORM}"
          mkdir -p "${DIFF_DIR}"

          INPUT_FILE="${{ inputs.dtb_source }}"
          BASENAME="${INPUT_FILE%.*}"
          EXT="${INPUT_FILE##*.}"
          COMPILE="${{ inputs.compile_dts }}"

          if [[ "${COMPILE}" == "true" ]]; then
            # 编译模式：从 make/dts/ 找 .dts
            [[ "${EXT}" == "dtb" ]] && DTS_FILE="${DTS_DIR}/${BASENAME}.dts" || DTS_FILE="${DTS_DIR}/${INPUT_FILE}"
            if [[ ! -f "${DTS_FILE}" ]]; then
              echo "❌ 找不到 DTS 文件: ${DTS_FILE}"
              exit 1
            fi
            sudo apt-get install -y device-tree-compiler
            dtc -I dts -O dtb -o "${DIFF_DIR}/${BASENAME}.dtb" "${DTS_FILE}"
            echo "✅ 已编译 ${BASENAME}.dtb → ${DIFF_DIR}"
          else
            # 直接复制模式：从 make/dtb/ 找 .dtb
            [[ "${EXT}" == "dts" ]] && DTB_FILE="${DTB_DIR}/${BASENAME}.dtb" || DTB_FILE="${DTB_DIR}/${INPUT_FILE}"
            if [[ ! -f "${DTB_FILE}" ]]; then
              echo "❌ 找不到 DTB 文件: ${DTB_FILE}"
              exit 1
            fi
            cp "${DTB_FILE}" "${DIFF_DIR}/"
            echo "✅ 已复制 ${DTB_FILE} → ${DIFF_DIR}"
          fi

          ls -la "${DIFF_DIR}"

      - name: 打包 FnNAS（调用官方 action）
        uses: ophub/fnnas@main
        with:
          fnnas_path: "${{ env.image_file }}"
          fnnas_board: ${{ inputs.fnnas_board }}
          fnnas_kernel: ${{ inputs.fnnas_kernel }}
          auto_kernel: true
          kernel_repo: ophub/fnnas
          rootfs_expand: ${{ inputs.rootfs_expand }}
          builder_name: ${{ inputs.builder_name }}

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        if: env.PACKAGED_STATUS == 'success' && !cancelled()
        with:
          tag: "fnnas_${{ inputs.fnnas_base_version }}"
          artifacts: "${{ env.PACKAGED_OUTPUTPATH }}/*"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 自定义 FnNAS 镜像
            - 基础镜像: ${{ inputs.fnnas_base_version }}
            - 设备型号: ${{ inputs.fnnas_board }}
            - 内核分支: ${{ inputs.fnnas_kernel }}
            - 设备树文件: ${{ inputs.dtb_source }}
            - 编译 DTS: ${{ inputs.compile_dts }}