# ==============================================================
# 自定义 FnNAS 构建脚本（借鉴 ophub/fnnas 官方仓库）
# 参考文件：
#   - https://github.com/ophub/fnnas/blob/main/action.yml
#   - https://github.com/ophub/fnnas/blob/main/make-fnnas/renas
# 功能：允许选择基础镜像、设备型号、内核版本，
#       并自动从 make/dts/ 或 make/dtb/ 目录识别 .dts/.dtb，
#       可选编译 .dts 为 .dtb 后注入镜像。
# ==============================================================

name: Custom Build FnNAS

on:
  workflow_dispatch:
    inputs:
      fnnas_base_version:
        description: "FnNAS 基础镜像版本"
        required: true
        type: choice
        default: "rockchip_1253"
        options:
          - amlogic_1252
          - amlogic_693
          - rockchip_1253
          - rockchip_692
          - allwinner_1254
          - allwinner_691
      fnnas_board:
        description: "目标设备型号（需与 different-files 目录对应）"
        required: true
        type: string
        default: "dg-tn3568"
      fnnas_kernel:
        description: "内核分支"
        required: true
        type: choice
        default: "6.18.y"
        options:
          - 6.18.y
          - 6.12.y
      dtb_source:
        description: "设备树文件名（存放于 make/dts/ 或 make/dtb/ 目录）"
        required: true
        type: string
        default: "rk3568-dg-tn3568-final.dtb"
      compile_dts:
        description: "是否需要从 .dts 编译（true=编译 .dts， false=直接使用 .dtb）"
        required: true
        type: boolean
        default: false
      builder_name:
        description: "固件签名"
        required: true
        type: choice
        default: "ophub"
        options:
          - ophub
          - angel
          - yourname
      rootfs_expand:
        description: "根分区扩容 (GiB)"
        required: false
        default: "16"

env:
  TZ: Etc/UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 处理自定义设备树
        id: dt
        run: |
          case "${{ inputs.fnnas_base_version }}" in
            amlogic*)   PLATFORM="amlogic" ;;
            rockchip*)  PLATFORM="rockchip" ;;
            allwinner*) PLATFORM="allwinner" ;;
            *)          PLATFORM="rockchip" ;;
          esac

          BOARD="${{ inputs.fnnas_board }}"
          DTS_DIR="${{ github.workspace }}/make/dts"
          DTB_DIR="${{ github.workspace }}/make/dtb"
          DIFF_DIR="${{ github.workspace }}/make-fnnas/fnnas-files/different-files/${BOARD}/boot/dtb/${PLATFORM}"
          mkdir -p "${DIFF_DIR}"

          INPUT_FILE="${{ inputs.dtb_source }}"
          BASENAME="${INPUT_FILE%.*}"
          EXT="${INPUT_FILE##*.}"
          COMPILE="${{ inputs.compile_dts }}"

          if [[ "${COMPILE}" == "true" ]]; then
            # 编译模式：从 make/dts/ 找 .dts 文件
            if [[ "${EXT}" == "dtb" ]]; then
              DTS_FILE="${DTS_DIR}/${BASENAME}.dts"
            else
              DTS_FILE="${DTS_DIR}/${INPUT_FILE}"
            fi
            if [[ ! -f "${DTS_FILE}" ]]; then
              echo "错误：找不到 DTS 源文件 ${DTS_FILE}"
              exit 1
            fi
            sudo apt-get install -y device-tree-compiler
            dtc -I dts -O dtb -o "${DIFF_DIR}/${BASENAME}.dtb" "${DTS_FILE}"
            echo "已编译 ${BASENAME}.dtb → ${DIFF_DIR}"
          else
            # 直接复制模式：从 make/dtb/ 找 .dtb 文件
            if [[ "${EXT}" == "dts" ]]; then
              DTB_FILE="${DTB_DIR}/${BASENAME}.dtb"
            else
              DTB_FILE="${DTB_DIR}/${INPUT_FILE}"
            fi
            if [[ ! -f "${DTB_FILE}" ]]; then
              echo "错误：找不到 DTB 文件 ${DTB_FILE}"
              exit 1
            fi
            cp "${DTB_FILE}" "${DIFF_DIR}/"
            echo "已复制 ${DTB_FILE} → ${DIFF_DIR}"
          fi

          ls -la "${DIFF_DIR}"

      - name: 打包 FnNAS（调用官方 action）
        uses: ophub/fnnas@main
        with:
          fnnas_path: "none"
          fnnas_board: ${{ inputs.fnnas_board }}
          fnnas_kernel: ${{ inputs.fnnas_kernel }}
          auto_kernel: true
          kernel_repo: ophub/fnnas
          rootfs_expand: ${{ inputs.rootfs_expand }}
          builder_name: ${{ inputs.builder_name }}

      - name: 上传到 Release
        uses: ncipollo/release-action@main
        if: env.PACKAGED_STATUS == 'success' && !cancelled()
        with:
          tag: "fnnas_${{ inputs.fnnas_base_version }}"
          artifacts: "${{ env.PACKAGED_OUTPUTPATH }}/*"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            📦 自定义 FnNAS 镜像
            - 基础镜像: ${{ inputs.fnnas_base_version }}
            - 设备型号: ${{ inputs.fnnas_board }}
            - 内核分支: ${{ inputs.fnnas_kernel }}
            - 设备树文件: ${{ inputs.dtb_source }}
            - 编译 DTS: ${{ inputs.compile_dts }}