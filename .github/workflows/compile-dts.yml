name: Compile DTS to DTB (本地文件)

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "是否自动提交并推送 DTB 到仓库？(true/false)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装设备树编译器
        run: sudo apt-get install -y device-tree-compiler

      - name: 编译缺失的 DTS → DTB
        run: |
          DTS_DIR="make/dts"
          DTB_DIR="make/dtb"

          if [ ! -d "$DTS_DIR" ]; then
            echo "⚠️ 未找到 $DTS_DIR 目录，退出。"
            exit 0
          fi

          mkdir -p "$DTB_DIR"

          compiled=0
          skipped=0
          failed=0

          for dts_file in "$DTS_DIR"/*.dts; do
            [ -e "$dts_file" ] || continue
            base=$(basename "$dts_file" .dts)
            dtb_file="$DTB_DIR/${base}.dtb"

            # 跳过已存在的 DTB
            if [ -f "$dtb_file" ]; then
              echo "⏭️ 跳过 (已存在): $dtb_file"
              skipped=$((skipped+1))
              continue
            fi

            echo "正在编译: $dts_file → $dtb_file"
            dtc -I dts -O dtb -o "$dtb_file" "$dts_file"
            if [ $? -eq 0 ]; then
              echo "✅ 编译成功: $dtb_file"
              compiled=$((compiled+1))
            else
              echo "❌ 编译失败: $dts_file"
              failed=$((failed+1))
            fi
          done

          echo "============================="
          echo "编译完成: 成功 $compiled, 跳过 $skipped, 失败 $failed"

          if [ $failed -gt 0 ]; then
            echo "有 DTS 文件编译失败，请检查文件内容或依赖的 .dtsi 是否缺失。"
            exit 1
          fi

      - name: 提交并推送 DTB 文件（可选）
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add make/dtb/
          if git diff --cached --quiet; then
            echo "没有新的 DTB 文件变更，无需提交。"
          else
            git commit -m "自动编译新增 DTS → DTB [skip ci]"
            git push
            echo "✅ DTB 文件已推送到仓库。"
          fi

      - name: 上传 DTB 作为构建产物（备选下载）
        if: ${{ inputs.commit_changes == 'false' || always() }}
        uses: actions/upload-artifact@v4
        with:
          name: compiled-dtb
          path: make/dtb/*.dtb